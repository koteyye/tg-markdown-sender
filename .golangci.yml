version: "2"
run:
  concurrency: 4
  timeout: 5m
  tests: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 50

linters:
  enable:
    - govet
    - staticcheck
    - unused
    - errcheck
    - errorlint
    - nilerr
    - forcetypeassert
    - copyloopvar
    - durationcheck
    - reassign
    - gocritic
    - revive
    - whitespace
    - godot
    - misspell
    - dupword
    - predeclared
    - errname
    - asciicheck
    - gocyclo
    - nestif
    - funlen
    - dupl
    - perfsprint
    - unconvert
    - ineffassign
    - goconst
    - gosec
    - bidichk
    - bodyclose
    - noctx
    - containedctx
    - fatcontext
    - sloglint
    - loggercheck
    - testifylint
    - thelper
    - usetesting
    - paralleltest
    - modernize
    - exptostd
    - intrange
    - usestdlibvars
    - exhaustive
    - nolintlint

  disable:
    - lll
    - prealloc
    - wrapcheck
    - err113
    - mnd
    - iface
    - nakedret
    - noinlineerr
    - gocognit
    - cyclop
    - depguard
    - goheader
    - importas
    - funcorder
    - godoclint
    - varnamelen
    - exhaustruct
    - gochecknoglobals
    - gochecknoinits
    - unparam
    - makezero
    - testpackage
    - embeddedstructfieldcheck
    - iotamixing
    - unqueryvet
    - recvcheck
    - mirror
    - protogetter
    - spancheck
    - zerologlint

  exclusions:
    paths:
      - vendor$
      - third_party$
      - testutils$
      - examples$
      - .agents

  settings:
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: true
    funlen:
      lines: 120
      statements: 80
    goconst:
      min-len: 3
      min-occurrences: 4
    gocyclo:
      min-complexity: 13
    gosec:
      config:
        G101:
          pattern: "(?i)private_key|passphrase|password|pwd|secret|token|bearer|api_key|apikey"
    nolintlint:
      require-explanation: true
      require-specific: true

formatters:
  enable:
    - gofmt
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - .agents
